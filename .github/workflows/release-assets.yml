name: Build Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v0.1.38)"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_title="SaveStories ${RELEASE_TAG#v}"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; preserving current title and notes."
          else
            gh release create "$RELEASE_TAG" --target "$GITHUB_SHA" --title "$release_title" --notes-file "./release_notes/latest.md"
          fi

  build-macos:
    needs: create-release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest available Xcode
        run: |
          xcode_path="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' | sort -V | tail -n 1)"
          if [ -z "$xcode_path" ]; then
            echo "No Xcode installation found in /Applications" >&2
            exit 1
          fi
          sudo xcode-select -s "$xcode_path/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Setup Node 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build macOS DMG
        run: |
          export SAVESTORIES_VERSION="${RELEASE_TAG#v}"
          export SAVESTORIES_BUILD="${GITHUB_RUN_NUMBER}"
          ./scripts/build_release_dmg.sh
          cp dist/release/SaveStories.dmg "dist/release/SaveStories-macOS-${RELEASE_TAG}.dmg"

      - name: Upload macOS asset to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" "dist/release/SaveStories-macOS-${RELEASE_TAG}.dmg" --clobber

      - name: Upload macOS asset as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-asset
          path: dist/release/SaveStories-macOS-${{ env.RELEASE_TAG }}.dmg

  build-windows-winui-beta:
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore WinUI beta solution
        shell: pwsh
        run: |
          dotnet restore .\windows_app_winui_beta\SaveStories.WinUI.Beta.sln

      - name: Build WinUI beta solution
        shell: pwsh
        run: |
          dotnet build .\windows_app_winui_beta\SaveStories.WinUI.Beta.sln -c Release -p:Platform=x64

      - name: Publish WinUI beta app
        shell: pwsh
        run: |
          $outDir = "dist\winui-beta"
          if (Test-Path $outDir) {
            Remove-Item $outDir -Force -Recurse
          }
          dotnet publish .\windows_app_winui_beta\src\SaveStories.WinUI.Beta\SaveStories.WinUI.Beta.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -o $outDir

      - name: Bundle Node.js runtime
        shell: pwsh
        run: |
          $nodeVersion = "v24.11.0"
          $nodeZip = "node-$nodeVersion-win-x64.zip"
          $downloadUrl = "https://nodejs.org/dist/$nodeVersion/$nodeZip"
          $zipPath = Join-Path $env:RUNNER_TEMP $nodeZip
          $extractRoot = Join-Path $env:RUNNER_TEMP "node-runtime"
          $targetDir = "dist\winui-beta\runtime\node"

          if (Test-Path $extractRoot) {
            Remove-Item $extractRoot -Recurse -Force
          }
          if (Test-Path $targetDir) {
            Remove-Item $targetDir -Recurse -Force
          }

          Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractRoot -Force
          $nodeRoot = Get-ChildItem -Path $extractRoot -Directory | Select-Object -First 1
          if (-not $nodeRoot) {
            throw "Unable to extract Node.js runtime."
          }
          New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
          Copy-Item -Path (Join-Path $nodeRoot.FullName "*") -Destination $targetDir -Recurse -Force

      - name: Install Inno Setup
        shell: pwsh
        run: |
          if (Get-Command ISCC.exe -ErrorAction SilentlyContinue) {
            Write-Host "Inno Setup already available."
          } else {
            choco install innosetup -y --no-progress
          }

      - name: Build WinUI beta installer EXE
        shell: pwsh
        run: |
          $version = "${{ env.RELEASE_TAG }}" -replace '^v', ''
          $sourceDir = (Resolve-Path "dist\winui-beta").Path
          $outputDir = (Resolve-Path "dist").Path
          $baseName = "SaveStories-Windows-WinUI-Beta-Setup-${{ env.RELEASE_TAG }}"
          $env:SAVESTORIES_VERSION = $version
          & ISCC.exe `
            "/DSourceDir=$sourceDir" `
            "/DOutputDir=$outputDir" `
            "/DOutputBaseFilename=$baseName" `
            ".\windows_app_winui_beta\SaveStories-WinUI-Beta.iss"
          if ($LASTEXITCODE -ne 0) {
            throw "ISCC failed with code $LASTEXITCODE"
          }

      - name: Upload WinUI beta installer to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $artifact = Get-ChildItem -Path "dist" -Filter "SaveStories-Windows-WinUI-Beta-Setup-${{ env.RELEASE_TAG }}.exe" -File | Select-Object -First 1
          if (-not $artifact) {
            throw "Windows WinUI beta installer was not produced."
          }
          gh release upload $env:RELEASE_TAG $artifact.FullName --clobber

  publish-update-feed:
    needs:
      - create-release
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS release artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release-asset
          path: dist/release

      - name: Setup Node 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check update signing key
        id: signing-key
        env:
          UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$UPDATE_SIGNING_PRIVATE_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate macOS appcast
        if: steps.signing-key.outputs.present == 'true'
        env:
          UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY }}
        run: |
          node ./scripts/generate_appcast.mjs \
            --asset "dist/release/SaveStories-macOS-${RELEASE_TAG}.dmg" \
            --asset-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/SaveStories-macOS-${RELEASE_TAG}.dmg" \
            --release-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}" \
            --version "${RELEASE_TAG#v}" \
            --build "${GITHUB_RUN_NUMBER}" \
            --mime-type "application/x-apple-diskimage" \
            --notes-file "./release_notes/latest.md" \
            --output "${RUNNER_TEMP}/appcast-macos.xml"

      - name: Publish update feed branch
        if: steps.signing-key.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin update-feed:update-feed >/dev/null 2>&1 || true
          if git show-ref --quiet refs/heads/update-feed; then
            git checkout update-feed
          else
            git checkout --orphan update-feed
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp "${RUNNER_TEMP}/appcast-macos.xml" ./appcast-macos.xml
          printf '%s\n' "${RELEASE_TAG}" > latest-version.txt
          git add appcast-macos.xml latest-version.txt
          if git diff --cached --quiet; then
            echo "Update feed is already current."
          else
            git commit -m "Update macOS appcast for ${RELEASE_TAG}"
            git push origin update-feed
          fi

      - name: Skip update feed publish
        if: steps.signing-key.outputs.present != 'true'
        run: echo "UPDATE_SIGNING_PRIVATE_KEY is not configured. Skipping appcast publish."
