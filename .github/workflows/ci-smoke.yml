name: CI Smoke

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "Sources/**"
      - "windows_app/**"
      - "windows_app_winui_beta/**"
      - "node_worker/**"
      - "scripts/**"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/release-assets.yml"
      - ".github/workflows/winui-beta-build.yml"
      - ".github/workflows/ci-smoke.yml"

jobs:
  swift-build-and-test:
    name: Swift Build And Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check whitespace
        run: git show --check --format=short --no-renames HEAD

      - name: Setup Node 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install worker dependencies
        working-directory: node_worker
        run: npm ci

      - name: Build macOS app
        run: swift build

      - name: Run Swift tests
        run: swift test

  worker-and-python-smoke:
    name: Worker And Python Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install worker dependencies
        working-directory: node_worker
        run: npm ci

      - name: Check version consistency
        run: python3 scripts/check_version_consistency.py

      - name: Check worker entrypoint syntax
        run: node --check node_worker/bridge.mjs

      - name: Run Node worker tests
        working-directory: node_worker
        run: npm test

      - name: Compile Windows Python sources
        run: python -m compileall windows_app/savestories_windows

      - name: Run Windows Python tests
        env:
          PYTHONPATH: windows_app
        run: python -m unittest discover -s windows_app/tests -p 'test_*.py'
