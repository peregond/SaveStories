name: Build WinUI

on:
  workflow_dispatch:
  push:
    tags:
      - "winui-beta-v*"
    paths:
      - "windows_app_winui_beta/**"
      - ".github/workflows/winui-beta-build.yml"

permissions:
  contents: write

jobs:
  build-winui:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore .\windows_app_winui_beta\SaveStories.WinUI.Beta.sln

      - name: Build
        shell: pwsh
        run: |
          dotnet build .\windows_app_winui_beta\SaveStories.WinUI.Beta.sln -c Release -p:Platform=x64

      - name: Publish unpackaged app
        shell: pwsh
        run: |
          $outDir = "dist\winui"
          if (Test-Path $outDir) {
            Remove-Item $outDir -Force -Recurse
          }
          dotnet publish .\windows_app_winui_beta\src\SaveStories.WinUI.Beta\SaveStories.WinUI.Beta.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -o $outDir

      - name: Smoke-test WinUI executable
        continue-on-error: true
        shell: pwsh
        run: |
          $exe = "dist\winui\SaveMe.WinUI.exe"
          if (-not (Test-Path $exe)) {
            throw "Executable not found: $exe"
          }
          $process = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 8
          if ($process.HasExited) {
            Write-Host "Smoke test warning: app exited too early with code $($process.ExitCode)"
            exit 0
          }
          Stop-Process -Id $process.Id -Force

      - name: Install Inno Setup
        shell: pwsh
        run: |
          if (Get-Command ISCC.exe -ErrorAction SilentlyContinue) {
            Write-Host "Inno Setup already available."
          } else {
            choco install innosetup -y --no-progress
          }

      - name: Build WinUI installer EXE
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          $sourceDir = (Resolve-Path "dist\winui").Path
          $outputDir = (Resolve-Path "dist").Path
          $baseName = "SaveMe-Windows-Setup-v$version"
          $env:SAVESTORIES_VERSION = $version
          & ISCC.exe `
            "/DSourceDir=$sourceDir" `
            "/DOutputDir=$outputDir" `
            "/DOutputBaseFilename=$baseName" `
            ".\windows_app_winui_beta\SaveStories-WinUI-Beta.iss"
          if ($LASTEXITCODE -ne 0) {
            throw "ISCC failed with code $LASTEXITCODE"
          }

      - name: Sign WinUI installer (optional)
        shell: pwsh
        env:
          WINDOWS_SIGN_PFX_BASE64: ${{ secrets.WINDOWS_SIGN_PFX_BASE64 }}
          WINDOWS_SIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_PFX_PASSWORD)) {
            Write-Host "Signing secrets are not configured. Skipping code-sign."
            exit 0
          }
          $setup = Get-ChildItem -Path "dist" -Filter "SaveMe-Windows-Setup-v*.exe" -File | Select-Object -First 1
          if (-not $setup) {
            throw "Installer not found for signing."
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:WINDOWS_SIGN_PFX_BASE64))
          $securePassword = ConvertTo-SecureString $env:WINDOWS_SIGN_PFX_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword | Out-Null
          $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue)
          if (-not $signtool) {
            throw "signtool.exe not found."
          }
          & $signtool.Source sign /fd SHA256 /td SHA256 /tr "http://timestamp.digicert.com" /a $setup.FullName
          if ($LASTEXITCODE -ne 0) {
            throw "signtool failed with code $LASTEXITCODE"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaveMe-Windows-Setup
          path: dist/SaveMe-Windows-Setup-v*.exe

      - name: Upload installer to GitHub prerelease
        if: startsWith(github.ref, 'refs/tags/winui-beta-v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $setup = Get-ChildItem -Path "dist" -Filter "SaveMe-Windows-Setup-v*.exe" -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $setup) {
            throw "Installer not found for tag: $tag"
          }
          if (gh release view $tag *> $null) {
            gh release upload $tag $setup.FullName --clobber
          } else {
            gh release create $tag $setup.FullName --title "SaveMe WinUI $tag" --prerelease --notes "Automated WinUI build."
          }
