name: Build Windows EXE (Legacy)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Node 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build Windows distribution
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process
          ./windows_app/build_windows.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process
          ./windows_app/build_windows_installer.ps1

      - name: Validate executable
        shell: pwsh
        run: |
          $exePath = "dist/windows/SaveMe-Windows/SaveMe-Windows.exe"
          if (-not (Test-Path $exePath)) {
            throw "Missing expected executable: $exePath"
          }
          $version = (Get-Content VERSION -Raw).Trim()
          $setupPath = "dist/windows/SaveMe-Windows-Setup-v$version.exe"
          if (-not (Test-Path $setupPath)) {
            throw "Missing expected installer: $setupPath"
          }

      - name: Package artifact
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process
          ./windows_app/package_windows_artifact.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: SaveMe-Windows
          path: |
            dist/windows/SaveMe-Windows
            dist/windows/SaveMe-Windows.zip
            dist/windows/SaveMe-Windows.sha256
            dist/windows/SaveMe-Windows-Setup-v*.exe
            dist/windows/SaveMe-Windows-Setup-v*.sha256
