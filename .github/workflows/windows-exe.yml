name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - "windows_app/**"
      - "node_worker/**"
      - ".github/workflows/windows-exe.yml"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build Windows distribution
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process
          ./windows_app/build_windows.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process
          ./windows_app/build_windows_installer.ps1

      - name: Validate executable
        shell: pwsh
        run: |
          $exePath = "dist/windows/SaveStories-Windows/SaveStories-Windows.exe"
          if (-not (Test-Path $exePath)) {
            throw "Missing expected executable: $exePath"
          }
          $version = (Get-Content VERSION -Raw).Trim()
          $setupPath = "dist/windows/SaveStories-Windows-Setup-v$version.exe"
          if (-not (Test-Path $setupPath)) {
            throw "Missing expected installer: $setupPath"
          }

      - name: Package artifact
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process
          ./windows_app/package_windows_artifact.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaveStories-Windows
          path: |
            dist/windows/SaveStories-Windows
            dist/windows/SaveStories-Windows.zip
            dist/windows/SaveStories-Windows.sha256
            dist/windows/SaveStories-Windows-Setup-v*.exe
            dist/windows/SaveStories-Windows-Setup-v*.sha256
